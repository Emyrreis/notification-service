name: CI - Testes Automatizados

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check app tests

      - name: Testes unitarios
        run: python -m pytest -m unit --no-cov

      - name: Testes de integracao
        run: python -m pytest -m integration --no-cov

      - name: Testes E2E
        run: python -m pytest -m e2e --no-cov

      - name: Cobertura com quality gate
        run: python -m pytest

      - name: Publicar relatorio de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
