[pytest]
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70

markers =
    unit: testes unitarios
    integration: testes de integracao
    e2e: testes ponta a ponta dos fluxos criticos
